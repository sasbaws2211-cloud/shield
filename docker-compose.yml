version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: swiftshield-postgres
    environment:
      POSTGRES_USER: swiftshield
      POSTGRES_PASSWORD: swiftshield_dev_password
      POSTGRES_DB: swiftshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: swiftshield-backend
    environment:
      DATABASE_URL: postgresql://swiftshield:swiftshield_dev_password@postgres:5432/swiftshield
      JWT_SECRET: dev-secret-key-min-256-bits-required-for-production
      DEBUG: "True"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  default:
    name: swiftshield-network
